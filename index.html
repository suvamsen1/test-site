<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaste World</title>
    <style>
        /* Import Futuristic Fonts from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #030305;
            /* Cyberpunk/Tech Grid Background */
            background-image: 
                radial-gradient(circle at 50% 50%, #121220 0%, #030305 70%),
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.03) 25%, rgba(0, 255, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.03) 75%, rgba(0, 255, 255, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.03) 25%, rgba(0, 255, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.03) 75%, rgba(0, 255, 255, 0.03) 76%, transparent 77%, transparent);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }
        
        .orb-cyan {
            width: 400px;
            height: 400px;
            background: rgba(0, 255, 255, 0.15);
            top: -10%;
            left: -10%;
        }

        .orb-magenta {
            width: 500px;
            height: 500px;
            background: rgba(255, 0, 85, 0.1);
            bottom: -20%;
            right: -10%;
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem 5rem;
            background: rgba(15, 15, 25, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 
                0 0 40px rgba(0, 0, 0, 0.8), 
                inset 0 0 20px rgba(0, 255, 255, 0.05);
            animation: float 6s ease-in-out infinite;
            max-width: 650px;
            width: 90%;
        }

        /* Glowing Main Heading */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 2rem;
            text-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6),
                0 0 40px rgba(0, 255, 255, 0.4);
            animation: pulse-glow 3s ease-in-out infinite alternate;
        }

        /* Body Text Styling */
        .message-box {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #a0a0b8;
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        .alert-text {
            display: inline-block;
            color: #ff0055;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin: 1.2rem 0;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
            animation: flicker 4s linear infinite;
        }

        .signature {
            display: block;
            margin-top: 2.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00ffff;
            font-weight: 500;
            letter-spacing: 4px;
            opacity: 0.9;
        }

        /* Keyframe Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse-glow {
            0% { 
                text-shadow: 0 0 10px rgba(0, 255, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.5); 
            }
            100% { 
                text-shadow: 0 0 15px rgba(0, 255, 255, 1), 0 0 30px rgba(0, 255, 255, 0.8), 0 0 50px rgba(0, 255, 255, 0.6); 
            }
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.4;
                text-shadow: none;
            }
        }
    </style>
</head>
<body>
    <!-- Ambient glowing lights -->
    <div class="ambient-orb orb-cyan"></div>
    <div class="ambient-orb orb-magenta"></div>

    <!-- Main Content -->
    <div class="container">
        <h1>Namaste World !!</h1>
        <div class="message-box">
            If you visited this website,<br>
            <span class="alert-text">CLOSE IT ASAP.</span><br>
            We don't entertain visitors here...<br>
            <span class="signature">~Suvam Sen</span>
        </div>
    </div>
</body>
</html>
